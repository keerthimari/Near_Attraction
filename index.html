<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Explore Pondicherry</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#container{
  display:flex;
  height:100%;
  width:100%;
}

/* ---------- Sidebar (Slack aubergine theme) ---------- */
#sidebar{
  width:420px;
  min-width:240px;
  max-width:70%;
  background:#3F0E40;               /* Slack sidebar purple */
  color:#E9E1EB;
  box-sizing:border-box;
  border-right:1px solid #2b0a2c;
  display:flex;
  flex-direction:column;
  height:100%;
  transition:width 0.2s ease;
}

#sidebar.collapsed{
  width:0;
  min-width:0;
  border:none;
  overflow:hidden;
}

#sidebar h2{
  margin:0;
  padding:18px 18px 12px 18px;
  color:#ffffff;
  font-size:22px;
  letter-spacing:0.3px;
}

.filters{
  flex:0 0 auto;
  padding:0 14px 12px 14px;
  border-bottom:1px solid rgba(255,255,255,0.12);
}

.filters button{
  margin:4px 4px 0 0;
  padding:7px 12px;
  cursor:pointer;
  background:#5A2A5C;
  color:#fff;
  border:1px solid #6d3a6f;
  border-radius:6px;
  font-size:13px;
  transition:background 0.15s ease;
}

.filters button:hover{
  background:#7a3f7c;
}

.filters.scrolled{
  box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

#listContainer{
  flex:1 1 auto;
  overflow-y:auto;
  padding:6px 8px 20px 8px;
}

.place{
  cursor:pointer;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.10);
  border-radius:6px;
  transition:background 0.15s ease;
}

.place:hover{
  background:rgba(255,255,255,0.08);
}

.place b{
  color:#ffffff;
  font-size:14px;
}

.place .preview{
  display:-webkit-box;
  -webkit-line-clamp:2;
  line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  font-size:12.5px;
  line-height:1.5;
  color:#C6B6CC;
  margin-top:3px;
}

.place.active{
  background:rgba(255,255,255,0.14);
}

/* ---------- Resizer + map ---------- */
#resizer{
  width:6px;
  background:#d9d9d9;
  cursor:col-resize;
  flex:0 0 auto;
}

#map{
  flex:1;
  height:100%;
}

/* ---------- Collapse button ---------- */
#collapseBtn{
  position:absolute;
  top:12px;
  left:12px;
  z-index:1300;
  background:#fff;
  border:1px solid #ccc;
  padding:6px 10px;
  cursor:pointer;
  border-radius:4px;
  font-size:14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
}

/* ---------- Natural blue sea overlay (east / Bay of Bengal) ---------- */
#seaGradient{
  position:absolute;
  right:0;
  top:0;
  width:55%;
  height:100%;
  background:linear-gradient(
    to right,
    rgba(56,132,194,0) 0%,
    rgba(56,132,194,0.10) 42%,
    rgba(40,110,180,0.30) 100%
  );
  pointer-events:none;
  z-index:250;                       /* above tiles, below markers/controls */
}

/* ---------- Reset view button ---------- */
#resetViewBtn{
  position:absolute;
  bottom:26px;
  right:20px;
  z-index:1200;
  background:#fff;
  border-radius:6px;
  padding:8px 12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
  font-size:13px;
  cursor:pointer;
}
#resetViewBtn:hover{ background:#f2f2f2; }

/* ---------- Marker highlight ---------- */
.leaflet-marker-icon{ transition:transform 0.2s ease, filter 0.2s ease; }
.marker-active{
  transform:scale(1.25);
  filter:drop-shadow(0 0 6px rgba(0,0,0,0.5));
  z-index:1000 !important;
}

/* ---------- Selection ring (indicator shown when a place is clicked) ---------- */
.selection-ring-wrap{ background:transparent !important; border:none !important; }
.selection-ring{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  box-sizing:border-box;
}
.selection-ring::before,
.selection-ring::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  box-sizing:border-box;
}
/* Steady solid ring so the clicked place is always clearly indicated. */
.selection-ring::before{
  width:46px;
  height:46px;
  border:3px solid #e53935;
  background:rgba(229,57,53,0.10);
  box-shadow:0 0 6px rgba(229,57,53,0.55);
}
/* Expanding pulse that radiates outward for extra emphasis. */
.selection-ring::after{
  width:46px;
  height:46px;
  border:3px solid rgba(229,57,53,0.85);
  animation:ringPulse 1.6s ease-out infinite;
}
@keyframes ringPulse{
  0%{ width:46px; height:46px; opacity:0.9; }
  100%{ width:78px; height:78px; opacity:0; }
}

/* ---------- Unified draggable info panel (all popups) ---------- */
#infoPanel{
  position:absolute;
  top:110px;
  right:34px;
  width:400px;
  max-width:calc(100% - 60px);
  max-height:72vh;
  background:#ffffff;
  border-radius:10px;
  box-shadow:0 12px 34px rgba(0,0,0,0.30);
  z-index:1250;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
#infoPanel.hidden{ display:none; }

#infoHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;   /* consistent header alignment for every popup */
  background:#2c7be5;
  color:#ffffff;
  padding:12px 16px;
  cursor:move;
  user-select:none;
  touch-action:none;
}

#infoTitle{
  text-align:left;
  font-size:17px;
  font-weight:700;
  line-height:1.3;
  padding-right:10px;
  font-family:Georgia, serif;
}

#infoClose{
  flex:0 0 auto;
  width:28px;
  height:28px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.20);
  color:#ffffff;
  font-size:15px;
  line-height:1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.15s ease, transform 0.15s ease;
}
#infoClose:hover{ background:rgba(255,255,255,0.38); transform:scale(1.08); }

#infoBody{
  padding:14px 18px 18px 18px;
  overflow-y:auto;
  font-size:14.5px;
  line-height:1.7;
  color:#333;
}
#infoBody p{ margin:0 0 12px 0; }
#infoBody p:last-child{ margin-bottom:0; }

#infoBody .dir-link{
  display:inline-block;
  margin-top:8px;
  color:#2c7be5;
  font-weight:bold;
  text-decoration:none;
}
#infoBody .dir-link:hover{ text-decoration:underline; }
</style>
</head>

<script>
const places = [{"name": "Cholamandal Artists’ Village", "cat": "Sightseeing Enroute", "lat": 12.9251991875747, "lon": 80.2528311248686, "desc": "Cholamandal Artists’ Village, established in 1966 near Chennai by the Madras Movement artists led by K. C. S. Paniker, is one of India’s largest self-sustaining artist communities. Spread across about 8 acres, it houses studios, galleries, and living spaces where painters and sculptors created modern Indian art. The village helped shape post-independence artistic identity through cooperative work and exhibitions. Visitors should explore its galleries to understand contemporary South Indian art and artist-led cultural initiatives.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.9251991875747,80.2528311248686"}, {"name": "Dakshinachitra", "cat": "Sightseeing Enroute", "lat": 12.8234662868807, "lon": 80.2418047746643, "desc": "Dakshinachitra is a living history museum located on the East Coast Road about 25 kilometers south of Chennai. Opened in 1996, the 10-acre complex preserves traditional houses relocated from Tamil Nadu, Kerala, Karnataka, and Andhra Pradesh. Craftspeople demonstrate weaving, pottery, and folk arts representing South Indian cultural traditions. Educational exhibits interpret architecture, domestic life, and regional customs. Visitors should spend time exploring the recreated heritage streets and experiencing traditional cuisine served at the museum café.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.8234662868807,80.2418047746643"}, {"name": "Crocodile Bank", "cat": "Sightseeing Enroute", "lat": 12.7435196991972, "lon": 80.2385340920958, "desc": "The Madras Crocodile Bank Trust and Centre for Herpetology was founded in 1976 by herpetologist Romulus Whitaker near Chennai. The conservation park houses more than 2,000 reptiles, including mugger, saltwater, and gharial crocodiles. Breeding programs support endangered reptile conservation and public education about wildlife ecology. Located along the East Coast Road, the facility also protects turtles and snakes. Visitors should observe these species to understand reptile conservation and coastal biodiversity in India.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.7435196991972,80.2385340920958"}, {"name": "Mahabalipuram (Mamallapuram)", "cat": ["Sightseeing Enroute", "Sightseeing near Pondicherry"], "lat": 12.6167228502699, "lon": 80.1992708571956, "desc": "Mahabalipuram, also called Mamallapuram, is a coastal heritage town on the Bay of Bengal about 60 km south of Chennai. Flourishing under the Pallava dynasty in the 7th–8th centuries, the town became a remarkable center of rock-cut architecture and maritime activity. Its monuments, now part of the Group of Monuments at Mahabalipuram, include cave temples, monolithic rathas, and the granite Shore Temple standing dramatically beside the sea. The vast open-air relief Descent of the Ganges, about 27 meters long, is among the world’s largest stone carvings.\n\nSandy beaches and weathered granite outcrops frame these monuments. Today, Mahabalipuram is also lively with stone-carving workshops, handicraft bazaars, and seaside cafés where artisans continue centuries-old sculpting traditions. A notable modern attraction is the India Seashell Museum, which houses one of India’s largest collections of marine shells and corals, displaying thousands of specimens with educational exhibits on marine biodiversity. Together, the temples, beach landscape, living crafts, and museums make Mahabalipuram an open-air cultural gallery by the sea.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.6167228502699,80.1992708571956"}, {"name": "Promenade Beach / Rock Beach", "cat": "Pondicherry", "lat": 11.9326985965363, "lon": 79.835922517742, "desc": "Stretching about 1.2 kilometers Promenade Beach, popularly called Rock Beach, forms the historic seafront of Pondicherry along the Bay of Bengal. The promenade road running beside it is today known as Goubert Avenue, but in earlier periods it carried several names reflecting the town’s changing urban history. During the French colonial era it was called Cours Chabrol, later Boulevard Est (Boulevard East), while older records also refer to the coastal fortification line as Rampart East.\n\nThe rocky shoreline was created in the late nineteenth and early twentieth centuries as stone embankments replaced the sandy coast to protect the town from erosion and strong monsoon seas. This seafront became the ceremonial façade of French Pondichéry, lined with colonial buildings, consulates, and monuments. Today, the promenade remains a historic urban space where the layered heritage of French planning and Tamil coastal life continues to meet the sea.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9326985965363,79.835922517742"}, {"name": "Kargil War Memorial", "cat": "Pondicherry", "lat": 11.9364396015926, "lon": 79.8364755256099, "desc": "The Kargil War Memorial stands along Goubert Avenue, commemorating Indian soldiers who lost their lives in the Kargil War. Inaugurated in 2000, the simple stone monument bears the names of the fallen and faces the Bay of Bengal, symbolically overlooking the city’s historic promenade. Each year on Kargil Vijay Diwas, tribute ceremonies are held here. Set within Puducherry’s public seafront, the memorial quietly links national remembrance with the everyday life of the coastal city.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9364396015926,79.8364755256099"}, {"name": "Sri Aurobindo Ashram Exhibition House", "cat": "Pondicherry", "lat": 11.9336044188475, "lon": 79.8359669174286, "desc": "The Sri Aurobindo Ashram Exhibition House was inaugurated in February 1956 by Mirra Alfassa of the Sri Aurobindo Ashram. Its first program presented a textile and embroidery exhibition, followed later that year by a photography exhibition. The venue was created to showcase artistic expression inspired by the spiritual philosophy of Sri Aurobindo. Through exhibitions, lectures, and workshops, the space explores art as a path toward aesthetic appreciation, inner development, and cultural renewal within the Ashram’s broader educational vision.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9336044188475,79.8359669174286"}, {"name": "Old Lighthouse", "cat": "Pondicherry", "lat": 11.9329570937847, "lon": 79.835587521083, "desc": "The Old Lighthouse stands along Goubert Avenue, marking the maritime heritage of Puducherry on the Coromandel Coast. Built by the French in 1836, the 29-meter masonry tower—distinguished by its round shaft rising from a square base—was constructed to guide ships approaching the colonial port. Before its construction, vessels relied only on a distant fire signal from the Red Hills, which proved inadequate for navigation. Responding to requests from merchants and ship captains, the project was undertaken during the tenure of Governor Saint-Simon and engineered by Louis Guerre.\n\nCompleted in just a few months at a cost of about 10,000 francs, the lighthouse stood on deep masonry foundations that stabilized it on sandy ground. When first lit in July 1836, its beacon was visible nearly 15 miles at sea. Later upgrades introduced electric lighting in 1913 and a stronger lamp in 1931. The lighthouse served navigation for more than a century until a modern structure replaced it in 1979, leaving the original tower as a notable colonial-era landmark along Puducherry’s waterfront.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9329570937847,79.835587521083"}, {"name": "Mahatma Gandhi Statue", "cat": "Pondicherry", "lat": 11.932573214128, "lon": 79.8359353600797, "desc": "The Mahatma Gandhi Statue stands prominently on Goubert Avenue, overlooking the Bay of Bengal. Inaugurated on 26 January 1965, the 4-meter statue of Mahatma Gandhi was created by sculptor Debi Prasad Roy Choudhury of the Madras School of Arts and Crafts. The monument depicts Gandhi holding his walking stick, symbolizing his leadership during India’s freedom struggle. Surrounding the statue are eight intricately carved monolithic granite pillars brought from Gingee Fort, believed to date back several centuries.\n\nLocal tradition also speaks of a sealed underground passage beneath the monument once thought to lead toward Gingee Fort. Today the statue remains one of Puducherry’s most recognizable civic landmarks along the historic promenade.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.932573214128,79.8359353600797"}, {"name": "Le Café", "cat": "Pondicherry", "lat": 11.9315609246942, "lon": 79.8357545947054, "desc": "Le Cafe, Beach road The building is the oldest post office building in the city and appears in Pondicherry's 1793 Town map when it was used as the Pondicherry's harbour office during the French period. Prior to that, approximately in 1790', the structure served as a new custom house. This structure represents a bridge between Pondicherry's past and present, due to its sea front location and the numerous transformations it underwent over the years. Today Le Cafe is one of the only 24 x 7 cafe's in Pondicherry.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9315609246942,79.8357545947054"}, {"name": "French War Memorial", "cat": "Pondicherry", "lat": 11.931887938756, "lon": 79.8355482575529, "desc": "The French War Memorial stands along Goubert Avenue, commemorating soldiers from French India who died during World War I. Built in 1938, the memorial features four white columns and a life-size statue of a soldier leaning on his rifle, set within a small landscaped garden facing the Bay of Bengal. An inscription on the monument reads “Aux combattants des Indes Françaises morts pour la patrie, 1914–1918,” honoring those who fought and died for France.\n\nThe First World War was one of the deadliest conflicts in history, with millions of casualties worldwide, including thousands of Indian soldiers. Each year on Bastille Day, the memorial is illuminated during tribute ceremonies, reflecting Puducherry’s enduring connection to its French colonial past.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.931887938756,79.8355482575529"}, {"name": "Dr. B. R. Ambedkar Manimandapam", "cat": "Pondicherry", "lat": 11.9290698429276, "lon": 79.835114354794, "desc": "The Dr. B. R. Ambedkar Manimandapam commemorates B. R. Ambedkar, a renowned jurist, social reformer, and champion of equality. Located near the Tourist Information Bureau in Puducherry, the memorial extends beyond a simple statue. The spacious complex includes exhibits explaining Ambedkar’s decisive role in drafting the Constitution of India, along with a library and research center that document his life, writings, and reform movements.\n\nThrough educational programs and public discussions, the site highlights Ambedkar’s lifelong struggle for social justice, democratic rights, and equality before law. The memorial thus serves both as a place of tribute and as a center for learning about India’s constitutional foundations and modern social reform.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9290698429276,79.835114354794"}, {"name": "Dupleix Statue", "cat": "Pondicherry", "lat": 11.9256746998887, "lon": 79.8342691075756, "desc": "The statue of Joseph François Dupleix stands near Goubert Avenue, overlooking the Bay of Bengal and recalling an important chapter in the history of French India. Dupleix governed from 1742 to 1754 and transformed Puducherry into the political center of French influence in South India.\n\nEarlier European companies had mainly focused on trade along India’s coasts. Dupleix, however, recognized the political opportunities created by regional conflicts and began forming alliances with Indian rulers, supporting rival claimants in local succession struggles to expand French influence. These strategies helped trigger the Carnatic Wars, during which the British East India Company adopted similar methods that later shaped the course of colonial expansion in India.\n\nColonial administration also depended on local intermediaries known as dubashes. The most famous was Ananda Ranga Pillai, whose detailed diaries provide a vivid record of Dupleix’s era and eighteenth-century Pondicherry.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9256746998887,79.8342691075756"}, {"name": "Sri Aurobindo Handmade Paper Factory", "cat": "Pondicherry", "lat": 11.9405611435774, "lon": 79.8335554932132, "desc": "The Sri Aurobindo Handmade Paper Factory began operations in 1942 as a small handmade paper unit associated with the Sri Aurobindo Ashram. Using cotton rags and recycled fibers rather than wood pulp, artisans create paper through traditional hand-processing techniques. Visitors can observe stages such as pulp preparation, sheet formation, pressing, and drying. Over time the workshop expanded to produce notebooks, stationery, lampshades, and decorative craft items. The factory reflects the ashram’s emphasis on sustainable production, skilled craftsmanship, and environmentally responsible small-scale industry.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9405611435774,79.8335554932132"}, {"name": "Sri Aurobindo Ashram", "cat": "Pondicherry", "lat": 11.9361294097145, "lon": 79.8341195152565, "desc": "The Sri Aurobindo Ashram was established in 1926 by Sri Aurobindo and his spiritual collaborator Mirra Alfassa. Before turning to spiritual work, Sri Aurobindo was an influential figure in India’s early freedom movement, advocating independence and inspiring nationalist thought. After moving to Puducherry in 1910, he gradually developed the philosophy of Integral Yoga, which seeks the transformation of human consciousness through spiritual practice and daily work.\n\nThe ashram later grew into an international community dedicated to meditation, education, and cultural activities. Its central courtyard contains the samadhi of both founders, a place of quiet reflection visited by thousands each year. Educational initiatives connected with the ashram, including the Sri Aurobindo International Centre of Education, have influenced alternative learning approaches emphasizing creativity, self-discovery, and holistic development. Today the ashram remains one of Puducherry’s most significant spiritual and cultural landmarks.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9361294097145,79.8341195152565"}, {"name": "Arulmigu Manakula Vinayagar Temple", "cat": "Pondicherry", "lat": 11.9357869247353, "lon": 79.8336727693317, "desc": "The Arulmigu Manakula Vinayagar Temple is one of the oldest and most revered temples in Puducherry, dedicated to Ganesha. Historical records indicate that worship existed here for centuries, even during the period of French colonial rule. The temple is known for its colorful gopuram decorated with sculpted deities and mythological scenes. Traditionally, a trained temple elephant greeted visitors with blessings at the entrance. Located close to the Sri Aurobindo Ashram, the temple continues as a vibrant center of daily worship and local devotion.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9357869247353,79.8336727693317"}, {"name": "Bharathi Park", "cat": "Pondicherry", "lat": 11.9330308535525, "lon": 79.8341933349908, "desc": "Bharathi Park lies at the heart of Puducherry’s French Quarter, forming a green square within the town’s colonial urban grid. The park occupies the former site of Fort Louis, built in the late seventeenth century under Louis XIV. After the fort was destroyed during Anglo-French conflicts in the eighteenth century, the open ground was gradually converted into a civic garden.\n\nAt its center stands the elegant Aayi Mandapam, completed in 1863 during the reign of Napoleon III. Designed as a commemorative water pavilion, it celebrates a local legend of Aayi, a courtesan who is believed to have built a reservoir that supplied drinking water to the town through canals. Marble plaques with Latin inscriptions recall this story.\n\nSurrounded by institutions such as the Legislative Assembly and Raj Nivas, the park today reflects Puducherry’s layered urban history—where colonial planning, civic space, and symbolic monuments intersect within the city’s linguistic and cultural landscape.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9330308535525,79.8341933349908"}, {"name": "Pondicherry Museum", "cat": "Pondicherry", "lat": 11.9344952276715, "lon": 79.8348710259634, "desc": "Pondicherry Museum preserves archaeological artifacts and colonial-period objects illustrating regional history. Collections include Chola and Pallava bronze sculptures, Roman trade amphora fragments discovered at nearby Arikamedu, and furniture from French administrative buildings. The museum building itself dates to the eighteenth century. Exhibits demonstrate maritime trade links between South India and the Mediterranean nearly two thousand years ago. Visitors should explore the galleries to understand Puducherry’s layered cultural and archaeological past.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9344952276715,79.8348710259634"}, {"name": "Alliance Française de Pondichéry", "cat": "Pondicherry", "lat": 11.9257904356573, "lon": 79.8322083493389, "desc": "Founded in 1889, the Alliance Française de Pondichéry is the oldest Alliance Française in India and among the earliest in the global network established after the Paris headquarters (1883). Located on Rue Suffren in the historic French quarter, it has long served as a linguistic and cultural bridge between India and France. Initially mobilizing around 370 members and multiple committees across French India, the institution promoted French language education during the colonial era and beyond. Today, it hosts language courses, cultural events, and a francophone library, organizing over a hundred cultural activities annually. For scholars of linguistic landscape, the Alliance represents a living site where French signage, pedagogy, and cultural exchange continue to shape Puducherry’s multilingual urban identity.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9257904356573,79.8322083493389"}, {"name": "Eglise de Notre Dame des Anges", "cat": "Pondicherry", "lat": 11.9300122855608, "lon": 79.8345549256743, "desc": "The Église de Notre Dame des Anges, also known as Our Lady of Angels Church, stands near the seafront in Puducherry’s historic White Town. Often called the White Chapel or Kaps Koil, it is the fourth-oldest church in the city and a notable example of Franco-Indian religious heritage. The present structure was completed in 1855 during the reign of Napoleon III and designed by engineer Louis Guerre.\n\nThe church reflects Greco-Roman architectural influences, inspired partly by chapels in Paris and the Sanctuary of Our Lady of Lourdes. Its symmetrical façade, twin bell towers, and preserved clock remain prominent features. Originally painted entirely white using limestone mixed with egg whites, the building later acquired its pastel tones. Historically, several earlier churches stood on this site, some destroyed during Anglo-French conflicts.\n\nToday the church is distinctive for conducting Mass in Tamil, English, and French, reflecting Puducherry’s layered linguistic landscape and multicultural religious life.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9300122855608,79.8345549256743"}, {"name": "Basilica of the Sacred Heart of Jesus", "cat": "Pondicherry", "lat": 11.9260785622154, "lon": 79.8269706519006, "desc": "The Basilica of the Sacred Heart of Jesus was constructed in 1908 by French missionaries and granted basilica status by the Vatican in 2011. Designed in Neo-Gothic architectural style, the church features pointed arches, stained glass panels, and tall spires. Biblical scenes appear in more than twenty colored glass windows. Located near Puducherry Railway Station, it attracts thousands of worshippers each year. Visitors should see the church for its architecture and religious significance.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9260785622154,79.8269706519006"}, {"name": "Pondy Marinaa", "cat": "Pondicherry", "lat": 11.9129900313544, "lon": 79.8296962546633, "desc": "Pondy Marinaa is a developed beachfront recreation area located south of central Puducherry. Designed as a leisure promenade, it includes landscaped seating zones, food kiosks, and open areas for public gatherings. The beach stretches along the Bay of Bengal and attracts evening visitors seeking sea views and coastal breezes. Local events and cultural activities occasionally take place nearby. Visitors should walk along this shoreline to experience contemporary seaside recreation in Puducherry.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9129900313544,79.8296962546633"}, {"name": "Immaculate Conception Cathedral", "cat": "Pondicherry", "lat": 11.9330379742044, "lon": 79.8302418088908, "desc": "Immaculate Conception Cathedral, locally called Samba Kovil, traces its origins to a church built by Jesuit missionaries in 1692. The present structure was completed in 1791 after several earlier buildings were destroyed during colonial conflicts. Its white façade and symmetrical towers reflect European church design adapted to South India. The cathedral remains the seat of the Roman Catholic Archdiocese of Pondicherry and Cuddalore. Visitors should see this historic church representing centuries of Christian presence in the region.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9330379742044,79.8302418088908"}, {"name": "Pondicherry Botanical Garden", "cat": "Pondicherry", "lat": 11.9304165994278, "lon": 79.8228175445959, "desc": "Pondicherry Botanical Garden was established in 1826 by French colonial administrators to study tropical plants. The garden covers about 22 acres and includes thematic plant sections, fountains, and tree-lined avenues. More than 1,500 plant species grow here, including rare medicinal and ornamental varieties. A small toy train operates within the grounds for visitors. The garden remains an important urban green space. Visitors should explore it to observe plant diversity and colonial botanical research history.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9304165994278,79.8228175445959"}, {"name": "Arts and Crafts Village", "cat": "Pondicherry", "lat": 11.9022232548217, "lon": 79.8122644254106, "desc": "Arts and Crafts Village near Puducherry showcases traditional handicrafts and rural artisan skills from Tamil Nadu. Workshops demonstrate pottery, weaving, wood carving, and terracotta production techniques passed through generations. Visitors can observe artisans shaping clay, spinning yarn, and carving decorative objects using manual tools. The village encourages preservation of regional crafts and provides economic opportunities for artisans. Cultural exhibitions and craft markets are occasionally organized. Visitors should explore it to understand traditional craftsmanship and rural livelihoods.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9022232548217,79.8122644254106"}, {"name": "Wills Boat House", "cat": "Pondicherry", "lat": 11.8980117211762, "lon": 79.8187954039947, "desc": "Wills Boat House is a recreational boating facility located near backwater channels outside Puducherry city. Paddle boats and small motorboats allow visitors to explore calm waterways surrounded by vegetation and rural landscapes. The area supports small-scale tourism focused on relaxed outdoor activity. Seasonal water levels influence boating routes and bird sightings. Such boat houses reflect the region’s connection with inland waterways. Visitors should experience the quiet scenery and observe everyday life along these waterways.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.8980117211762,79.8187954039947"}, {"name": "Eden Beach (Blue Flag Certified)", "cat": "Pondicherry", "lat": 11.8814510524851, "lon": 79.8242187317387, "desc": "Eden Beach near Puducherry received international Blue Flag certification in 2021, recognizing strict environmental standards for water quality, safety, and coastal management. Facilities include lifeguard stations, accessible walkways, waste-management systems, and regulated swimming areas. Located south of the city, the beach represents an effort to promote sustainable coastal tourism along India’s eastern shoreline. Educational signboards explain marine ecology and conservation. Visitors should explore this example of responsible beach management.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.8814510524851,79.8242187317387"}, {"name": "Chunnambar Boat House (Paradise island)", "cat": "Pondicherry", "lat": 11.8838846912388, "lon": 79.8006810048311, "desc": "Chunnambar Boat House lies about 8 kilometers south of Puducherry where the Chunnambar River meets the Bay of Bengal. Operated by the tourism department, the facility provides ferry services across backwaters to Paradise Beach on a sandy barrier island. Boat rides pass mangrove patches and estuarine landscapes. The area demonstrates how rivers shape coastal ecosystems. Visitors should take the short boat journey to observe the meeting of river and sea environments.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.8838846912388,79.8006810048311"}, {"name": "Pondy Ocean Park", "cat": "Pondicherry", "lat": 11.8740337610266, "lon": 79.7968295586692, "desc": "Pondy Ocean Park is a water-based recreation park located along the East Coast Road near Puducherry. The park includes swimming pools, water slides, artificial wave areas, and play zones designed for family visitors. Such recreational parks represent the growth of leisure tourism along the Coromandel Coast. Facilities are designed with safety supervision and controlled water circulation systems. Visitors interested in modern entertainment infrastructure may explore this park for a different perspective of tourism.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.8740337610266,79.7968295586692"}, {"name": "Sandunes Beach", "cat": "Pondicherry", "lat": 11.8717118023778, "lon": 79.8201272894167, "desc": "Sandunes Beach lies along the East Coast Road north of Puducherry and is known for its natural sand formations shaped by coastal winds. The relatively quiet shoreline contrasts with the busy city promenade. Fishing boats and small coastal settlements operate nearby, reflecting traditional livelihoods along the Coromandel Coast. Seasonal monsoon waves reshape the dunes and shoreline patterns each year. Visitors should walk here to observe coastal geomorphology and everyday fishing community activity.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.8717118023778,79.8201272894167"}, {"name": "Ousteri Lake (Osudu Lake)", "cat": "Pondicherry", "lat": 11.9416885716096, "lon": 79.7463411566946, "desc": "Ousteri Lake, also called Osudu Lake, is a large freshwater wetland about 10 kilometers from Puducherry. Covering roughly 390 hectares, it supports migratory birds including pelicans, painted storks, and open-bill storks. The wetland has been declared a wildlife sanctuary due to its ecological importance. Seasonal water levels influence fish populations and aquatic plants. The lake forms part of a regional biodiversity corridor. Visitors interested in birdwatching and wetlands should observe this protected ecosystem.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.9416885716096,79.7463411566946"}, {"name": "Matrimandir in Auroville", "cat": "Pondicherry", "lat": 12.0038343610295, "lon": 79.8011026258938, "desc": "Matrimandir is the central meditation structure of Auroville, an international township founded in 1968. The golden spherical building rises about 30 meters high within landscaped gardens called the Peace Area. Inside, a silent white marble chamber holds a crystal globe used during meditation sessions. The structure symbolizes human unity and collective spiritual exploration envisioned by The Mother. Access is carefully regulated for quiet contemplation. Visitors should view it to understand Auroville’s unique philosophy.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.0038343610295,79.8011026258938"}, {"name": "Auroville Bamboo Centre", "cat": "Pondicherry", "lat": 12.0129775255706, "lon": 79.8012437229394, "desc": "Auroville Bamboo Centre promotes research and training in bamboo construction and handicrafts. Located within the Auroville township, the center demonstrates sustainable uses of bamboo as a renewable building material. Workshops teach techniques for furniture making, structural design, and craft production using locally available species. Bamboo grows rapidly and is valued as an environmentally responsible resource. The center collaborates with architects and artisans. Visitors should explore it to learn about sustainable materials and eco-design innovation.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.0129775255706,79.8012437229394"}, {"name": "SVARAM - Musical Instruments and Research", "cat": "Pondicherry", "lat": 12.0149461353521, "lon": 79.8013543950236, "desc": "SVARAM is an experimental center in Auroville dedicated to sound research and musical instrument creation. Founded in the early 2000s, it designs instruments using bamboo, metal, stone, and recycled materials. The Sound Garden allows visitors to interact with large outdoor instruments producing natural tones. Workshops explore acoustics, vibration, and traditional music cultures. SVARAM combines art, science, and education in one space. Visitors should experience this interactive environment to understand sound as a universal cultural expression.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.0149461353521,79.8013543950236"}, {"name": "Panchavatee Hanuman Temple", "cat": "Sightseeing near Pondicherry", "lat": 12.0098920062618, "lon": 79.7723457934633, "desc": "Panchavatee Hanuman Temple near Puducherry is dedicated to Lord Hanuman, a central figure in the Ramayana epic. The temple features a tall Hanuman statue visible from surrounding roads and gardens planted with sacred trees mentioned in Hindu texts. Devotees visit regularly for prayer, especially on Tuesdays and Saturdays traditionally associated with Hanuman worship. The complex also includes meditation spaces and shrines. Visitors should observe how epic mythology continues to shape contemporary religious practice.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.0098920062618,79.7723457934633"}, {"name": "Thillai Nataraja Temple, Chidambaram", "cat": "Sightseeing near Pondicherry", "lat": 11.3993042842705, "lon": 79.6935187456014, "desc": "Thillai Nataraja Temple in Chidambaram is dedicated to Lord Shiva as Nataraja, the cosmic dancer. The temple complex covers about 40 acres and includes four towering gopurams rising roughly 40 meters. Historical inscriptions date parts of the structure to the Chola dynasty between the 10th and 13th centuries. The temple is famous for the “Chidambara Rahasyam,” a symbolic representation of divine presence. Visitors should see this sacred site illustrating South Indian temple architecture and Shaivite philosophy.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.3993042842705,79.6935187456014"}, {"name": "Pichavaram Mangrove Forest, Chidambaram", "cat": "Sightseeing near Pondicherry", "lat": 11.4319059655308, "lon": 79.7810480975623, "desc": "Pichavaram Mangrove Forest lies between the Vellar and Coleroon estuaries near Chidambaram. Covering more than 1,100 hectares, it is one of India’s largest mangrove ecosystems. Narrow waterways pass through dense mangrove trees that support fish nurseries, migratory birds, and coastal biodiversity. Small boats allow visitors to navigate the channels. Mangroves also help reduce coastal erosion and storm damage. Visitors should explore this unique wetland environment to understand coastal ecology and conservation.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.4319059655308,79.7810480975623"}, {"name": "Gingee Fort (Senji Fort)", "cat": "Sightseeing near Pondicherry", "lat": 12.2502567358812, "lon": 79.3948440230528, "desc": "Gingee Fort, also called Senji Fort, is a massive hill fortress complex about 160 kilometers from Chennai. Built and expanded between the 13th and 17th centuries by various dynasties, it includes three fortified hills rising nearly 240 meters. Stone walls, granaries, temples, and watchtowers remain within the complex. European travelers once called it the “Troy of the East.” Visitors should climb its paths to understand historical military architecture and strategic hill fort design.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.2502567358812,79.3948440230528"}, {"name": "Arulmigu Arunachaleswarar Temple, Tiruvannamalai", "cat": "Sightseeing near Pondicherry", "lat": 12.2316689935642, "lon": 79.0677609767358, "desc": "Arulmigu Arunachaleswarar Temple in Tiruvannamalai is dedicated to Lord Shiva and associated with the sacred Arunachala hill. The temple complex covers around 25 acres and features gopurams rising up to 66 meters. Major expansions occurred under the Chola and Vijayanagara dynasties between the 9th and 16th centuries. Thousands participate in the monthly Girivalam pilgrimage walking a 14-kilometer path around the hill. Visitors should witness this major Shaivite pilgrimage center and temple architecture.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.2316689935642,79.0677609767358"}, {"name": "Sadras", "cat": "Sightseeing near Pondicherry", "lat": 12.5286514309339, "lon": 80.1654285321079, "desc": "Sadras, historically called Sadurangapattinam, was a Dutch trading settlement along the Coromandel Coast during the 17th and 18th centuries. The remaining Dutch fort complex includes warehouses, defensive walls, and a cemetery containing intricately carved tombs of Dutch officials. Archaeological conservation has preserved sections of the fort near Kalpakkam. The site reflects European maritime trade networks that once linked India with Southeast Asia and Europe. Visitors should explore Sadras to observe colonial-era coastal trading history.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.5286514309339,80.1654285321079"}, {"name": "Kancheepuram", "cat": "Sightseeing near Pondicherry", "lat": 12.8372004828136, "lon": 79.7041685687485, "desc": "Kancheepuram, located about 75 kilometers from Chennai, is one of India’s oldest continuously inhabited cities. Known historically as a major center of learning and religion, it flourished under Pallava rule between the 4th and 9th centuries. The city contains numerous temples including Ekambareswarar and Kamakshi Amman. Kancheepuram is also famous for silk weaving traditions producing ceremonial sarees. Visitors should explore this historic city to understand South Indian temple architecture and traditional textile heritage.", "dir": "https://www.google.com/maps/dir/?api=1&destination=12.8372004828136,79.7041685687485"}, {"name": "Kumbakonam", "cat": "Sightseeing near Pondicherry", "lat": 10.9601897596412, "lon": 79.3845209361772, "desc": "Kumbakonam in Tamil Nadu is a historic temple town located between the Cauvery and Arasalar rivers. The region contains more than 180 temples, many built or expanded during the Chola dynasty around the 9th to 12th centuries. Every 12 years the Mahamaham festival draws large pilgrimages to the Mahamaham tank. The town is also known for brass utensil production and traditional South Indian filter coffee culture. Visitors should explore its dense concentration of temples and ritual traditions.", "dir": "https://www.google.com/maps/dir/?api=1&destination=10.9601897596412,79.3845209361772"}, {"name": "Nachiyar Koil (near Kumbakonam)", "cat": "Sightseeing near Pondicherry", "lat": 10.9176770995429, "lon": 79.4454714478399, "desc": "Nachiyar Koil, officially called Srinivasa Perumal Temple, lies about 10 kilometers from Kumbakonam. The temple is dedicated to Vishnu and is unusual because the goddess Nachiyar receives prominent ritual importance. Architectural features include a tall rajagopuram and stone mandapams built during medieval Chola and later Nayak periods. The temple is famous for Kal Garuda, a stone Garuda idol carried during festivals that appears to grow heavier. Visitors should observe this distinctive Vaishnavite tradition.", "dir": "https://www.google.com/maps/dir/?api=1&destination=10.9176770995429,79.4454714478399"}, {"name": "Thanjavur (Tanjore)", "cat": "Sightseeing near Pondicherry", "lat": 10.7828041169657, "lon": 79.1314602032739, "desc": "Thanjavur, historically known as Tanjore, served as the capital of the powerful Chola Empire during the 10th and 11th centuries. The city is home to the Brihadeeswarar Temple, built by Raja Raja Chola I in 1010 CE and now a UNESCO World Heritage monument. The temple’s granite vimana tower rises about 66 meters. Thanjavur is also renowned for classical paintings and bronze sculptures. Visitors should explore the city to understand Chola architecture and South Indian artistic traditions.", "dir": "https://www.google.com/maps/dir/?api=1&destination=10.7828041169657,79.1314602032739"}, {"name": "Tharangambadi (Tranquebar)", "cat": "Sightseeing near Pondicherry", "lat": 11.0250431837772, "lon": 79.8561627380577, "desc": "Tharangambadi, historically called Tranquebar, was a Danish trading colony established in 1620 on the Coromandel Coast. Fort Dansborg, built by the Danish East India Company, still stands facing the sea. The settlement later became an early center of Protestant missionary activity in India during the 18th century. Colonial houses, churches, and fort walls remain along the shoreline. Visitors should walk through the town to observe preserved Scandinavian colonial architecture in India.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.0250431837772,79.8561627380577"}, {"name": "Velankanni", "cat": "Sightseeing near Pondicherry", "lat": 10.6803053343858, "lon": 79.850113731407, "desc": "Velankanni in Tamil Nadu is home to the Basilica of Our Lady of Good Health, one of India’s most important Christian pilgrimage centers. Devotion here dates to reported Marian apparitions during the 16th century. The basilica was elevated to minor basilica status by the Vatican in 1962. Each year the ten-day annual festival in September attracts hundreds of thousands of pilgrims. Visitors should witness this major pilgrimage site reflecting shared faith traditions across communities.", "dir": "https://www.google.com/maps/dir/?api=1&destination=10.6803053343858,79.850113731407"}, {"name": "Gangaikonda Cholapuram", "cat": "Sightseeing near Pondicherry", "lat": 11.2064758568483, "lon": 79.448471912448, "desc": "Gangaikonda Cholapuram was established in the 11th century by the Chola emperor Rajendra I after his northern military campaigns. The city once served as the imperial capital of the Chola Empire. Its Brihadeeswarar-style temple features a monumental vimana tower about 55 meters high. Sculptures and inscriptions document Chola political power and temple culture. The site is now part of the UNESCO-listed Great Living Chola Temples. Visitors should explore it to understand Chola imperial architecture.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.2064758568483,79.448471912448"}, {"name": "Poompuhar", "cat": "Sightseeing near Pondicherry", "lat": 11.1432430175631, "lon": 79.8576827492165, "desc": "Poompuhar, also known as Kaveripoompattinam, was an ancient port city at the mouth of the Cauvery River. Sangam literature dating roughly between 300 BCE and 300 CE describes it as a bustling maritime trade center. Archaeological findings suggest connections with Roman and Southeast Asian merchants. Much of the ancient city was lost to coastal erosion and shifting shorelines over centuries. Visitors should explore the coastal remains and museum exhibits to understand early South Indian maritime history.", "dir": "https://www.google.com/maps/dir/?api=1&destination=11.1432430175631,79.8576827492165"}];
</script>

<script>
/* =========================================================================
   Explore Pondicherry — consolidated application logic
   ========================================================================= */

/* Origin for the Directions feature: Anandha Inn Convention Centre & Suites,
   154 S.V. Patel Salai, Puducherry (corrected coordinates). */
const ANANDHA_INN = { lat: 11.941969, lon: 79.828755 };

/* Shared "Pondicherry view" — used by Complete Tour, In Pondicherry and the
   Reset button. Centred so roughly half the map shows land and half the Bay
   of Bengal (item 6 / item 9). */
const PONDY_VIEW = { center: [11.928, 79.842], zoom: 15 };

/* Filter intro popups: header + description (items 10-14). Keyed by the
   internal category value passed to showCat(). */
const FILTER_INFO = {
  'All': {
    title: 'Puducherry & Its Cultural Landscape',
    body:
`This map brings together the wider cultural landscape of Puducherry and its surrounding regions as an interconnected narrative of coast, hinterland, and memory. Along the Coromandel Coast, colonial boulevards, churches, and seafront structures reveal layered European and Tamil histories, while inland temple towns and sacred geographies trace continuities from the Pallava, Chola, and Vijayanagara periods.

Wetlands, mangroves, rivers, and backwaters shape ecological networks that supported early ports and continue to sustain biodiversity. Artistic enclaves, craft traditions, and experimental communities—from modern art villages to Auroville—extend this landscape into contemporary cultural expression.

Together, these sites form a continuous cultural corridor where environment, history, architecture, and living traditions intersect, offering a deeper understanding of Tamil Nadu’s evolving identity across time and space.`
  },
  'Sightseeing Enroute': {
    title: 'The Journey Begins',
    body:
`The journey from Chennai to Puducherry along the scenic East Coast Road offers a rich sequence of cultural and ecological landmarks. The route begins with the Cholamandal Artists’ Village, established in 1966 under K. C. S. Paniker, where cooperative studios shaped post-independence South Indian art. Further along, Dakshinachitra presents reconstructed traditional homes and crafts, offering insights into regional architecture and lived cultures. Nearby, the Madras Crocodile Bank Trust, founded by Romulus Whitaker, highlights coastal biodiversity and conservation efforts.

The route culminates at Mahabalipuram, a UNESCO World Heritage site renowned for Pallava-era rock-cut temples, monumental reliefs, and continuing stone-carving traditions. Together, these stops form a layered cultural corridor—where art, ecology, architecture, and multilingual signage create a dynamic linguistic and visual landscape along the coast.`
  },
  'Pondicherry': {
    title: 'Where Heritage Meets the Sea',
    body:
`Puducherry, formerly Pondicherry, is a coastal settlement on the Coromandel Coast whose history spans both South Indian empires and European colonial networks. Between the 4th and 14th centuries it formed part of the Pallava, Chola, and Pandya realms, later passing under Vijayanagara and subsequent regional powers.

European maritime trade reshaped the town from the 16th century onward, beginning with the Portuguese, followed by the Dutch and Danes. The French established a permanent colony in 1674 under François Martin, later expanded by Joseph François Dupleix into a fortified port town. A defining feature of colonial planning was the geometric street grid, divided by a canal separating the French Ville Blanche and Tamil quarters—an early example of spatial and linguistic segregation.

Despite British occupations in the 18th century, French rule continued until 1954 (ratified in 1962). The town also sheltered Sri Aurobindo, linking it to India’s nationalist history. Today, its bilingual signage, layered toponyms, and Franco-Tamil culture make Puducherry a living landscape of historical interaction.`
  },
  'Sightseeing near Pondicherry': {
    title: 'Beyond the City, Into the Landscape',
    body:
`The region surrounding Puducherry unfolds as a layered cultural and ecological landscape where coast, river, and inland plains intersect. Moving beyond the seafront, one encounters sacred geographies shaped by temple towns, pilgrimage routes, and living ritual traditions that have evolved from the Chola and Vijayanagara periods to the present. Vast temple complexes, hill forts, and ancient urban centers reveal shifting political power, architectural innovation, and regional identities.

Along the coast and estuaries, mangrove forests and lost port cities speak of maritime trade, environmental change, and long-distance cultural exchange across the Bay of Bengal. Colonial enclaves further add European layers to this terrain, creating a palimpsest of languages, scripts, and place names.

Together, these sites form a continuum where ecology, devotion, craft traditions, and multilingual landscapes coexist - offering not just sightseeing, but an immersive journey into South India’s interconnected histories and cultural expressions.`
  }
};

/* ---------- Map ---------- */
const map = L.map('map', { zoomAnimation:true, fadeAnimation:true, markerZoomAnimation:true })
  .setView(PONDY_VIEW.center, PONDY_VIEW.zoom);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/* ---------- Marker styling ---------- */
function getColor(name){
  name = name.toLowerCase();
  if(name.includes("temple")) return "#e67e22";
  if(name.includes("beach")) return "#3498db";
  if(name.includes("church") || name.includes("basilica") || name.includes("cathedral")) return "#8e44ad";
  if(name.includes("fort")) return "#c0392b";
  if(name.includes("museum")) return "#2c3e50";
  if(name.includes("park") || name.includes("lake")) return "#27ae60";
  return "#7f8c8d";
}
function getIcon(name){
  name = name.toLowerCase();
  if(name.includes("temple")) return "🛕";
  if(name.includes("beach")) return "🌊";
  if(name.includes("church") || name.includes("basilica") || name.includes("cathedral")) return "⛪";
  if(name.includes("fort")) return "🏰";
  if(name.includes("museum")) return "🏛";
  if(name.includes("park") || name.includes("lake")) return "🌿";
  return "📍";
}

/* ---------- Build markers (no Leaflet popups — everything uses the panel) ---- */
let markers = [];
let activeMarker = null;

places.forEach(p => {
  const icon = L.divIcon({
    className:'marker-icon',
    html:'<div style="background:'+getColor(p.name)+';width:26px;height:26px;border-radius:50%;'
        +'display:flex;align-items:center;justify-content:center;color:white;font-size:15px;">'
        +getIcon(p.name)+'</div>',
    iconSize:[26,26]
  });
  const m = L.marker([p.lat, p.lon], { icon: icon });
  const entry = { marker: m, data: p };
  m.on('click', () => selectPlace(entry));
  markers.push(entry);
});

/* ---------- Selection ring (indicator shown when a place is clicked) ---------- */
const ringIcon = L.divIcon({
  className: 'selection-ring-wrap',
  html: '<div class="selection-ring"></div>',
  iconSize: [80, 80],
  iconAnchor: [40, 40]
});
let ringMarker = null;

function showRing(lat, lon){
  if(!ringMarker){
    ringMarker = L.marker([lat, lon], {
      icon: ringIcon,
      interactive: false,       /* clicks pass through to the place marker */
      keyboard: false,
      zIndexOffset: -100         /* sit behind the place marker */
    });
  } else {
    ringMarker.setLatLng([lat, lon]);
  }
  ringMarker.addTo(map);
}

function hideRing(){
  if(ringMarker) map.removeLayer(ringMarker);
}

/* ---------- Unified draggable info panel ---------- */
const infoPanel = document.createElement('div');
infoPanel.id = 'infoPanel';
infoPanel.className = 'hidden';
infoPanel.innerHTML =
    '<div id="infoHeader"><span id="infoTitle"></span>'
  + '<button id="infoClose" type="button" aria-label="Close">&#10005;</button></div>'
  + '<div id="infoBody"></div>';
document.body.appendChild(infoPanel);

const infoTitle = document.getElementById('infoTitle');
const infoBody  = document.getElementById('infoBody');
const infoHeader = document.getElementById('infoHeader');
document.getElementById('infoClose').addEventListener('click', hideInfo);

function toParagraphs(text){
  return text.split(/\n\s*\n/).map(t => '<p>' + t.trim() + '</p>').join('');
}

/* Reset panel to its default position on the right (over the sea). */
function resetPanelPosition(){
  infoPanel.style.left = 'auto';
  infoPanel.style.top  = '110px';
  infoPanel.style.right = '34px';
}

function showInfo(title, bodyHTML, reposition){
  infoTitle.textContent = title;
  infoBody.innerHTML = bodyHTML;
  infoBody.scrollTop = 0;
  if(reposition) resetPanelPosition();
  infoPanel.classList.remove('hidden');
}

function hideInfo(){
  infoPanel.classList.add('hidden');
}

function showFilterInfo(cat){
  const f = FILTER_INFO[cat];
  if(!f) return;
  showInfo(f.title, toParagraphs(f.body), true);
}

function showPlaceInfo(p){
  const dir = 'https://www.google.com/maps/dir/?api=1'
            + '&origin=' + ANANDHA_INN.lat + ',' + ANANDHA_INN.lon
            + '&destination=' + p.lat + ',' + p.lon;
  const html = toParagraphs(p.desc)
             + '<a class="dir-link" href="' + dir + '" target="_blank" rel="noopener">Directions &rsaquo;</a>';
  showInfo(p.name, html, true);
}

/* ---------- Panel dragging (drag by the header) ---------- */
(function(){
  let dragging = false, sx = 0, sy = 0, startLeft = 0, startTop = 0;

  infoHeader.addEventListener('pointerdown', function(e){
    if(e.target.closest('#infoClose')) return;
    dragging = true;
    const r = infoPanel.getBoundingClientRect();
    startLeft = r.left; startTop = r.top;
    sx = e.clientX; sy = e.clientY;
    infoPanel.style.left = startLeft + 'px';
    infoPanel.style.top  = startTop + 'px';
    infoPanel.style.right = 'auto';
    infoHeader.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  infoHeader.addEventListener('pointermove', function(e){
    if(!dragging) return;
    let nl = startLeft + (e.clientX - sx);
    let nt = startTop  + (e.clientY - sy);
    nl = Math.max(0, Math.min(nl, window.innerWidth  - 60));
    nt = Math.max(0, Math.min(nt, window.innerHeight - 40));
    infoPanel.style.left = nl + 'px';
    infoPanel.style.top  = nt + 'px';
  });

  function endDrag(){ dragging = false; }
  infoHeader.addEventListener('pointerup', endDrag);
  infoHeader.addEventListener('pointercancel', endDrag);
})();

/* ---------- Selection + rendering ---------- */
function setActiveMarker(m){
  if(activeMarker && activeMarker._icon){
    activeMarker._icon.classList.remove('marker-active');
  }
  activeMarker = m;
  if(activeMarker && activeMarker._icon){
    activeMarker._icon.classList.add('marker-active');
  }
  document.querySelectorAll('.place').forEach(el => el.classList.remove('active'));
}

function selectPlace(entry){
  setActiveMarker(entry.marker);
  // Ring indicator around the clicked place.
  showRing(entry.data.lat, entry.data.lon);
  // Centre slightly west of the marker so the marker sits on the land side and
  // the panel opens over the sea to the right.
  map.setView([entry.data.lat, entry.data.lon + 0.012], 15, { animate: true });
  showPlaceInfo(entry.data);
  // Highlight the matching sidebar row if present.
  if(entry._row) entry._row.classList.add('active');
}

function catMatches(placeCat, cat){
  if(cat === 'All') return true;
  if(Array.isArray(placeCat)) return placeCat.indexOf(cat) !== -1;
  return placeCat === cat;
}

const list = document.getElementById('list');

function render(cat){
  list.innerHTML = '';
  // Clear any previous selection indicator when switching filters.
  setActiveMarker(null);
  hideRing();
  const visible = [];

  markers.forEach(o => {
    o._row = null;
    if(catMatches(o.data.cat, cat)){
      o.marker.addTo(map);

      const div = document.createElement('div');
      div.className = 'place';
      let short = o.data.desc || '';
      if(short.length > 160) short = short.substring(0,160) + '...';
      div.innerHTML = "<b>" + o.data.name + "</b><div class='preview'>" + short + "</div>";
      div.onclick = () => selectPlace(o);
      list.appendChild(div);
      o._row = div;

      visible.push(o);
    } else {
      map.removeLayer(o.marker);
    }
  });

  // Map positioning (items 6 & 9)
  if(cat === 'All' || cat === 'Pondicherry'){
    // Complete Tour & In Pondicherry always use the shared Pondicherry view.
    map.setView(PONDY_VIEW.center, PONDY_VIEW.zoom, { animate: true });
  } else if(visible.length){
    const b = L.latLngBounds(visible.map(o => L.latLng(o.data.lat, o.data.lon)));
    map.fitBounds(b.pad(0.25));
  }

  // Filter intro popup (over the sea, stays until closed)
  showFilterInfo(cat);
}

function showCat(cat){ render(cat); }
window.showCat = showCat;

/* ---------- Reset view button (item 9: same as Pondicherry view) ---------- */
document.getElementById('resetViewBtn').addEventListener('click', function(){
  setActiveMarker(null);
  hideRing();
  map.setView(PONDY_VIEW.center, PONDY_VIEW.zoom, { animate: true });
  showFilterInfo('All');
});

/* ---------- Sidebar resizer ---------- */
(function(){
  const resizer = document.getElementById('resizer');
  const sidebar = document.getElementById('sidebar');
  let isResizing = false;

  resizer.addEventListener('mousedown', function(){
    isResizing = true;
    sidebar.style.transition = 'none';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e){
    if(!isResizing) return;
    let w = e.clientX;
    if(w < 240) w = 240;
    if(w > window.innerWidth * 0.7) w = window.innerWidth * 0.7;
    sidebar.style.width = w + 'px';
    map.invalidateSize();
  });
  document.addEventListener('mouseup', function(){
    if(!isResizing) return;
    isResizing = false;
    sidebar.style.transition = 'width 0.2s ease';
    document.body.style.userSelect = '';
    map.invalidateSize();
  });
})();

/* ---------- Collapse button ---------- */
(function(){
  const collapseBtn = document.getElementById('collapseBtn');
  const sidebar = document.getElementById('sidebar');
  collapseBtn.addEventListener('click', function(){
    sidebar.classList.toggle('collapsed');
    collapseBtn.innerHTML = sidebar.classList.contains('collapsed') ? '&#8680;' : '&#8678;';
    setTimeout(() => map.invalidateSize(), 250);
  });
})();

/* ---------- Sidebar scroll shadow ---------- */
(function(){
  const lc = document.getElementById('listContainer');
  const filters = document.querySelector('.filters');
  if(!lc || !filters) return;
  lc.addEventListener('scroll', function(){
    filters.classList.toggle('scrolled', lc.scrollTop > 0);
  });
})();

/* ---------- Initial load: Complete Tour view + popup (item 11) ---------- */
render('All');

</script>

</body>
</html>
